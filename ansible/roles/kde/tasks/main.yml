---
# KDE Plasma desktop configuration

- name: Set SDDM as default display manager
  systemd:
    name: sddm
    enabled: yes

- name: Create SDDM config directory
  file:
    path: /etc/sddm.conf.d
    state: directory

- name: Configure SDDM
  copy:
    dest: /etc/sddm.conf.d/arches.conf
    content: |
      [Theme]
      Current=breeze

      [General]
      Numlock=on

