---
# ============================================================================
# KDE Plasma — Declarative Configuration
# ============================================================================
#
# Runs in chroot during install (cold filesystem, no running Plasma/D-Bus).
# All settings are written via kwriteconfig6 or direct file templates.
# No D-Bus notifications needed — Plasma will read these on first boot.
# ============================================================================

# --------------------------------------------------------------------------
# 0. Install extra packages
# --------------------------------------------------------------------------
- name: Install KDE extra packages
  pacman:
    name: "{{ kde_extra_packages }}"
    state: present
  # Pre-installed during pacstrap — no-op if already present.

- name: Install custom plasmoid packages (from local repo)
  command: >-
    pacman -S --noconfirm --needed --overwrite '*'
    {{ kde_custom_plasmoid_packages | join(' ') }}
  register: plasmoid_install
  changed_when: "'reinstalling' in plasmoid_install.stdout"
  failed_when: false
  # Pre-installed as override packages. --needed makes this a no-op.
  # failed_when: false handles the case where local repo is unavailable.

# --------------------------------------------------------------------------
# 1. Display Manager (SDDM)
# --------------------------------------------------------------------------
- name: Enable SDDM
  systemd:
    name: sddm
    enabled: yes

- name: Create SDDM config directory
  file:
    path: /etc/sddm.conf.d
    state: directory
    mode: "0755"

- name: Configure SDDM
  copy:
    dest: /etc/sddm.conf.d/arches.conf
    mode: "0644"
    content: |
      [Theme]
      Current=breeze

      [General]
      Numlock=on

# --------------------------------------------------------------------------
# 2. Ensure config directories exist
# --------------------------------------------------------------------------
- name: Create KDE config directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ kde_user }}"
    group: "{{ kde_user }}"
    mode: "0700"
  loop:
    - "{{ kde_config }}"
    - "{{ kde_local_share }}/konsole"
    - "{{ kde_config }}/autostart"

# --------------------------------------------------------------------------
# 2b. Disable Baloo file indexer
# --------------------------------------------------------------------------
# Baloo indexes files for KDE's tags:/ KIO protocol and search features.
# It's resource-heavy and causes "Could not enter folder tags:/" errors
# if it hasn't finished indexing. Disable it system-wide.
- name: "Baloo: disable file indexing"
  command: >-
    kwriteconfig6 --file "{{ kde_config }}/baloofilerc"
    --group "Basic Settings"
    --key "Indexing-Enabled"
    "false"
  become_user: "{{ kde_user }}"

# --------------------------------------------------------------------------
# 2c. Remove KDE Welcome Center
# --------------------------------------------------------------------------
- name: "Welcome: remove plasma-welcome package"
  pacman:
    name: plasma-welcome
    state: absent
    force: true
  when: not kde_desktop.welcome_wizard

# --------------------------------------------------------------------------
# 2d. Override Plasma system-wide defaults
# --------------------------------------------------------------------------
# Plasma reads these on first login to decide the desktop containment
# and initial panel layout. Must be system-wide files, not per-user.

- name: "Plasma defaults: set Desktop containment (not Folder View)"
  copy:
    dest: /usr/share/plasma/shells/org.kde.plasma.desktop/contents/defaults
    mode: "0644"
    content: |
      [Desktop]
      Containment={{ kde_desktop.layout }}
      ToolBox=
      RuntimePlatform=Desktop

      [Desktop][ContainmentActions]
      RightButton;NoModifier=org.kde.contextmenu
      MiddleButton;NoModifier=org.kde.paste

      [Panel]
      Containment=org.kde.panel
      ToolBox=org.kde.paneltoolbox
      [Panel][ContainmentActions]
      RightButton;NoModifier=org.kde.contextmenu

- name: "Plasma defaults: override default panel layout script"
  template:
    src: default-panel-layout.js.j2
    dest: /usr/share/plasma/layout-templates/org.kde.plasma.desktop.defaultPanel/contents/layout.js
    mode: "0644"

# --------------------------------------------------------------------------
# 3. KWin — Virtual Desktops
# --------------------------------------------------------------------------
- name: "KWin: set number of virtual desktops"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kwinrc
    --group Desktops --key Number
    {{ kde_kwin.virtual_desktops.number }}

- name: "KWin: set virtual desktop rows"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kwinrc
    --group Desktops --key Rows
    {{ kde_kwin.virtual_desktops.rows }}

- name: "KWin: set virtual desktop names"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kwinrc
    --group Desktops --key Id_{{ idx + 1 }}
    {{ item }}
  loop: "{{ kde_kwin.virtual_desktops.names }}"
  loop_control:
    index_var: idx

# --------------------------------------------------------------------------
# 4. KWin — Tiling
# --------------------------------------------------------------------------
- name: "KWin: set tiling padding"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kwinrc
    --group Tiling --key padding
    {{ kde_kwin.tiling.padding }}

# --------------------------------------------------------------------------
# 5. KWin — Titlebar
# --------------------------------------------------------------------------
- name: "KWin: titlebar double-click action"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kwinrc
    --group Windows --key TitlebarDoubleClickCommand
    {{ kde_kwin.titlebar.double_click_action }}

# --------------------------------------------------------------------------
# 6. KWin — Xwayland scale
# --------------------------------------------------------------------------
- name: "KWin: Xwayland global scale"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kwinrc
    --group Xwayland --key Scale
    {{ kde_kwin.xwayland.scale }}

# --------------------------------------------------------------------------
# 7. Power / Energy — powerdevil
# --------------------------------------------------------------------------
- name: "Power: AC profile"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/powerdevilrc
    --group AC --key {{ item.key }}
    {{ item.value }}
  loop:
    - { key: "DimDisplayIdleTimeoutSec",  value: "{{ kde_power.ac.dim_display_timeout }}" }
    - { key: "DPMSIdleTimeoutSec",        value: "{{ kde_power.ac.dpms_timeout }}" }
    - { key: "SuspendAndPowerButtonAction", value: "0" }
    - { key: "AutoSuspendIdleTimeoutSec",  value: "{{ kde_power.ac.suspend_timeout }}" }
    - { key: "AutoSuspendAction",          value: "0" }

- name: "Power: Battery profile"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/powerdevilrc
    --group Battery --key {{ item.key }}
    {{ item.value }}
  loop:
    - { key: "DimDisplayIdleTimeoutSec",  value: "{{ kde_power.battery.dim_display_timeout }}" }
    - { key: "DPMSIdleTimeoutSec",        value: "{{ kde_power.battery.dpms_timeout }}" }
    - { key: "AutoSuspendIdleTimeoutSec",  value: "{{ kde_power.battery.suspend_timeout }}" }
    - { key: "AutoSuspendAction",          value: "0" }

- name: "Power: Low Battery profile"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/powerdevilrc
    --group LowBattery --key {{ item.key }}
    {{ item.value }}
  loop:
    - { key: "DimDisplayIdleTimeoutSec",  value: "{{ kde_power.low_battery.dim_display_timeout }}" }
    - { key: "DPMSIdleTimeoutSec",        value: "{{ kde_power.low_battery.dpms_timeout }}" }
    - { key: "AutoSuspendIdleTimeoutSec",  value: "{{ kde_power.low_battery.suspend_timeout }}" }
    - { key: "AutoSuspendAction",          value: "0" }

- name: "Power: Critical battery level and action"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/powerdevilrc
    --group BatteryCritical --key {{ item.key }}
    {{ item.value }}
  loop:
    - { key: "CriticalBatteryLevel",       value: "{{ kde_power.critical_battery.level }}" }
    - { key: "CriticalBatteryAction",      value: "{{ kde_power.critical_battery.action }}" }

- name: "Power: Lid close action"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/powerdevilrc
    --group LidAction --key {{ item.key }}
    {{ item.value }}
  loop:
    - { key: "InhibitLidActionWhenExternalMonitorPresent", value: "false" }
    - { key: "LidAction",                  value: "0" }

# --------------------------------------------------------------------------
# 8. Input — Touchpad (kcminputrc)
# --------------------------------------------------------------------------
- name: "Input: touchpad settings"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kcminputrc
    --group Libinput --group "{{ kde_input.touchpad.name }}" --group "Touchpad"
    --key {{ item.key }}
    {{ item.value }}
  loop:
    - { key: "NaturalScroll",         value: "{{ kde_input.touchpad.natural_scroll | lower }}" }
    - { key: "TapToClick",            value: "{{ kde_input.touchpad.tap_to_click | lower }}" }
    - { key: "ClickMethod",           value: "{{ kde_input.touchpad.click_method }}" }
    - { key: "DisableWhileTyping",    value: "{{ kde_input.touchpad.disable_while_typing | lower }}" }
    - { key: "PointerAcceleration",   value: "{{ kde_input.touchpad.pointer_acceleration }}" }
    - { key: "PointerAccelerationProfile", value: "{{ kde_input.touchpad.pointer_acceleration_profile }}" }

# --------------------------------------------------------------------------
# 9. Input — Keyboard
# --------------------------------------------------------------------------
- name: "Input: keyboard settings"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kcminputrc
    --group Keyboard --key {{ item.key }}
    {{ item.value }}
  loop:
    - { key: "NumLock",       value: "{{ kde_input.keyboard.numlock_on_startup }}" }
    - { key: "RepeatDelay",   value: "{{ kde_input.keyboard.repeat_delay }}" }
    - { key: "RepeatRate",    value: "{{ kde_input.keyboard.repeat_rate }}" }

# --------------------------------------------------------------------------
# 10. Input — Cursor
# --------------------------------------------------------------------------
- name: "Input: cursor theme and size"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kcminputrc
    --group Mouse --key {{ item.key }}
    {{ item.value }}
  loop:
    - { key: "cursorTheme", value: "{{ kde_input.cursor.theme }}" }
    - { key: "cursorSize",  value: "{{ kde_input.cursor.size }}" }

# --------------------------------------------------------------------------
# 11. Session — logout, lock, KRunner
# --------------------------------------------------------------------------
- name: "Session: disable logout confirmation"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/ksmserverrc
    --group General --key confirmLogout
    false
  when: not kde_session.logout_confirm

- name: "Session: set shutdown type"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/ksmserverrc
    --group General --key shutdownType
    {{ kde_session.logout_prompt }}

# --------------------------------------------------------------------------
# 12. Screen Locker
# --------------------------------------------------------------------------
- name: "Screen locker: disable autolock"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kscreenlockerrc
    --group Daemon --key {{ item.key }}
    {{ item.value }}
  loop:
    - { key: "Autolock",   value: "false" }
    - { key: "LockOnResume", value: "false" }
    - { key: "Timeout",    value: "0" }
  when: not kde_screenlocker.autolock

# --------------------------------------------------------------------------
# 13. Disable delete confirmation (KIO)
# --------------------------------------------------------------------------
- name: "KIO: disable delete confirmation"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kiorc
    --group Confirmations --key ConfirmDelete
    false
  when: not kde_kded.delete_confirmation

- name: "KIO: disable trash confirmation"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kiorc
    --group Confirmations --key ConfirmTrash
    false
  when: not kde_kded.delete_confirmation

# --------------------------------------------------------------------------
# 14. KRunner — disable desktop search typing
# --------------------------------------------------------------------------
- name: "KRunner: disable free-floating activation"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/krunnerrc
    --group General --key FreeFloating
    false
  when: not kde_krunner.desktop_search_typing

# --------------------------------------------------------------------------
# 15. Theme / Appearance
# --------------------------------------------------------------------------
# Use kwriteconfig6 instead of plasma-apply-* tools, which require a
# running Plasma session and crash (SIGABRT) when run from a systemd service.

- name: "Theme: set color scheme"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kdeglobals
    --group General --key ColorScheme
    {{ kde_theme.color_scheme }}

- name: "Theme: set Plasma visual style"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/plasmarc
    --group Theme --key name
    {{ kde_theme.plasma_theme }}

- name: "Theme: set cursor theme"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kcminputrc
    --group Mouse --key cursorTheme
    {{ kde_theme.cursor_theme }}

- name: "Theme: set cursor size"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kcminputrc
    --group Mouse --key cursorSize
    {{ kde_theme.cursor_size }}

# --------------------------------------------------------------------------
# 16. Fonts (kdeglobals)
# --------------------------------------------------------------------------
- name: "Fonts: configure system fonts"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kdeglobals
    --group General --key {{ item.key }}
    "{{ item.value }}"
  loop:
    - { key: "font",        value: "{{ kde_theme.font.general }}" }
    - { key: "fixed",       value: "{{ kde_theme.font.fixed }}" }
    - { key: "smallestReadableFont", value: "{{ kde_theme.font.small }}" }
    - { key: "toolBarFont", value: "{{ kde_theme.font.toolbar }}" }
    - { key: "menuFont",    value: "{{ kde_theme.font.menu }}" }

# --------------------------------------------------------------------------
# 17. Window Decoration
# --------------------------------------------------------------------------
- name: "Window decoration: set plugin"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kwinrc
    --group org.kde.kdecoration2 --key library
    {{ kde_theme.window_decoration }}

# --------------------------------------------------------------------------
# 18. Icon theme
# --------------------------------------------------------------------------
- name: "Icons: set icon theme"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/kdeglobals
    --group Icons --key Theme
    {{ kde_theme.icon_theme }}

# --------------------------------------------------------------------------
# 19. Shortcuts — deploy kglobalshortcutsrc via Jinja2 template
# --------------------------------------------------------------------------
- name: "Shortcuts: deploy kglobalshortcutsrc"
  template:
    src: kglobalshortcutsrc.j2
    dest: "{{ kde_config }}/kglobalshortcutsrc"
    owner: "{{ kde_user }}"
    group: "{{ kde_user }}"
    mode: "0600"

# --------------------------------------------------------------------------
# 20. Konsole profile
# --------------------------------------------------------------------------
- name: "Konsole: create profile"
  template:
    src: konsole-profile.j2
    dest: "{{ kde_local_share }}/konsole/{{ kde_konsole.default_profile }}"
    owner: "{{ kde_user }}"
    group: "{{ kde_user }}"
    mode: "0644"

- name: "Konsole: set default profile"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/konsolerc
    --group "Desktop Entry" --key DefaultProfile
    {{ kde_konsole.default_profile }}

- name: "Konsole: set tab bar position"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/konsolerc
    --group TabBar --key TabBarPosition
    {{ kde_konsole.tab_bar_position }}

# --------------------------------------------------------------------------
# 21. Panel / Widgets
# --------------------------------------------------------------------------
# The panel is created by Plasma on first login using the overridden
# layout script at /usr/share/plasma/layout-templates/.../layout.js
# (deployed in task 2c above). No need to generate an appletsrc file —
# Plasma creates one itself from the layout script.
#
# If we pre-generate an appletsrc, Plasma ignores it on first login
# and overwrites it with its own defaults from the layout script.

- name: "Panel: ensure no stale appletsrc exists"
  file:
    path: "{{ kde_config }}/plasma-org.kde.plasma.desktop-appletsrc"
    state: absent

- name: "Panel: clean up any leftover config JSON"
  file:
    path: "{{ kde_config }}/arches-panel-config.json"
    state: absent

# --------------------------------------------------------------------------
# 22. XDG User Directories
# --------------------------------------------------------------------------
- name: "XDG: deploy user-dirs.dirs"
  template:
    src: user-dirs.dirs.j2
    dest: "{{ kde_config }}/user-dirs.dirs"
    owner: "{{ kde_user }}"
    group: "{{ kde_user }}"
    mode: "0644"

- name: "XDG: disable automatic directory creation"
  copy:
    dest: "{{ kde_config }}/user-dirs.conf"
    owner: "{{ kde_user }}"
    group: "{{ kde_user }}"
    mode: "0644"
    content: |
      enabled=False

# --------------------------------------------------------------------------
# 23. libinput-gestures
# --------------------------------------------------------------------------
- name: "Gestures: deploy config"
  template:
    src: libinput-gestures.conf.j2
    dest: "{{ kde_config }}/libinput-gestures.conf"
    owner: "{{ kde_user }}"
    group: "{{ kde_user }}"
    mode: "0644"

- name: "Gestures: add user to input group"
  user:
    name: "{{ kde_user }}"
    groups: input
    append: yes

- name: "Gestures: create autostart entry"
  copy:
    dest: "{{ kde_config }}/autostart/libinput-gestures.desktop"
    owner: "{{ kde_user }}"
    group: "{{ kde_user }}"
    mode: "0644"
    content: |
      [Desktop Entry]
      Type=Application
      Name=libinput-gestures
      Exec=libinput-gestures
      X-GNOME-Autostart-enabled=true
  when: kde_libinput_gestures.autostart

# --------------------------------------------------------------------------
# 24. ~/dotfiles/env.sh — user-editable environment variables
# --------------------------------------------------------------------------
# The env.sh stub lives in ~/dotfiles/ and is symlinked into Plasma's
# env autoload directory.  The user edits ~/dotfiles/env.sh directly
# for PATH additions, API keys, etc.  Ansible only creates the initial
# stub — it is NOT overwritten on subsequent runs (creates: yes).
# --------------------------------------------------------------------------
- name: "Dotfiles: create ~/dotfiles directory"
  file:
    path: "{{ kde_dotfiles_dir }}"
    state: directory
    owner: "{{ kde_user }}"
    group: "{{ kde_user }}"
    mode: "0755"

- name: "Dotfiles: create env.sh stub (will not overwrite)"
  copy:
    dest: "{{ kde_dotfiles_dir }}/env.sh"
    owner: "{{ kde_user }}"
    group: "{{ kde_user }}"
    mode: "0700"
    force: no
    content: "{{ kde_env_sh_content }}"

- name: "Env: create Plasma env directory"
  file:
    path: "{{ kde_config }}/plasma-workspace/env"
    state: directory
    owner: "{{ kde_user }}"
    group: "{{ kde_user }}"
    mode: "0700"

- name: "Env: symlink ~/dotfiles/env.sh into Plasma env autoload"
  file:
    src: "{{ kde_dotfiles_dir }}/env.sh"
    dest: "{{ kde_config }}/plasma-workspace/env/env.sh"
    state: link
    owner: "{{ kde_user }}"
    group: "{{ kde_user }}"

# --------------------------------------------------------------------------
# 25. Generic kwriteconfig6 entries (catch-all)
# --------------------------------------------------------------------------
- name: "Generic kwriteconfig6 entries"
  command: >-
    kwriteconfig6 --file {{ kde_config }}/{{ item.file }}
    --group {{ item.group }} --key {{ item.key }}
    {{ item.value }}
  loop: "{{ kde_kwriteconfig_entries }}"
  when: kde_kwriteconfig_entries | length > 0

# --------------------------------------------------------------------------
# 26. Fix ownership of entire config tree
# --------------------------------------------------------------------------
- name: "Fix ownership of all user files"
  file:
    path: "{{ item }}"
    owner: "{{ kde_user }}"
    group: "{{ kde_user }}"
    recurse: yes
  loop:
    - "{{ kde_config }}"
    - "{{ kde_home }}/.local"
    - "{{ kde_home }}/dotfiles"
