# Arches dev workstation — nginx config
# Listens on localhost only. Not internet-accessible.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Default server — localhost only
    server {
        listen 127.0.0.1:80;
        listen [::1]:80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }

    # Include drop-in configs for project-specific reverse proxies
    include /etc/nginx/conf.d/*.conf;
}
