---
# Base system configuration — applied to all templates

- name: Set default shell to zsh for root
  user:
    name: root
    shell: /bin/zsh

- name: Configure pacman parallel downloads
  lineinfile:
    path: /etc/pacman.conf
    regexp: '^#?ParallelDownloads'
    line: 'ParallelDownloads = 5'
    insertafter: '^\[options\]'

- name: Enable Color in pacman
  lineinfile:
    path: /etc/pacman.conf
    regexp: '^#?Color'
    line: 'Color'
    insertafter: '^\[options\]'

- name: Configure makepkg to use all cores
  lineinfile:
    path: /etc/makepkg.conf
    regexp: '^#?MAKEFLAGS='
    line: 'MAKEFLAGS="-j$(nproc)"'

- name: Set journald max disk usage
  lineinfile:
    path: /etc/systemd/journald.conf
    regexp: '^#?SystemMaxUse='
    line: 'SystemMaxUse=50M'
    create: yes

- name: Enable NTP
  systemd:
    name: systemd-timesyncd
    enabled: yes
    state: started

# --------------------------------------------------------------------------
# Neovim — base config for all users
# --------------------------------------------------------------------------

- name: Create neovim config directory for {{ ansible_user | default('brian') }}
  become_user: "{{ ansible_user | default('brian') }}"
  file:
    path: "/home/{{ ansible_user | default('brian') }}/.config/nvim"
    state: directory
    mode: '0755'

- name: Deploy neovim config for {{ ansible_user | default('brian') }}
  become_user: "{{ ansible_user | default('brian') }}"
  copy:
    src: init.lua
    dest: "/home/{{ ansible_user | default('brian') }}/.config/nvim/init.lua"
    mode: '0644'

- name: Create neovim config directory for root
  file:
    path: /root/.config/nvim
    state: directory
    mode: '0755'

- name: Deploy neovim config for root
  copy:
    src: init.lua
    dest: /root/.config/nvim/init.lua
    mode: '0644'
