#
# p1-performance — Full performance for ThinkPad P1 Gen 7
#
# Intel Core Ultra 7 165H (Meteor Lake) + NVIDIA RTX 3000 Ada
#
# CPU locked to max frequency, turbo enabled, firmware
# power envelope maximized, all power savings disabled.
# GPU is managed separately via gpu-ollama script.
#

[main]
summary=ThinkPad P1 Gen 7 — maximum performance

[cpu]
governor=performance
energy_perf_bias=performance
energy_performance_preference=performance
min_perf_pct=100
boost=1

[acpi]
platform_profile=performance

[audio]
timeout=0

[video]
panel_power_savings=0

[disk]
readahead=>4096

[scsi_host]
alpm=max_performance

[sysctl]
vm.swappiness=10
kernel.sched_autogroup_enabled=1
