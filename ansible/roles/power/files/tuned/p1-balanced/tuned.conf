#
# p1-balanced — Daily driver for ThinkPad P1 Gen 7
#
# Intel Core Ultra 7 165H (Meteor Lake) + NVIDIA RTX 3000 Ada
#
# Kernel-driven frequency scaling, turbo available for bursts,
# moderate firmware power envelope.
# GPU is managed separately via gpu-ollama script.
#

[main]
summary=ThinkPad P1 Gen 7 — balanced daily driver

[cpu]
governor=schedutil|powersave
energy_perf_bias=normal
energy_performance_preference=balance_power
boost=1

[acpi]
platform_profile=balanced

[audio]
timeout=10

[video]
panel_power_savings=1

[disk]

[scsi_host]
alpm=med_power_with_dipm

[sysctl]
kernel.nmi_watchdog=0

[script]
script=${i:PROFILE_DIR}/script.sh
