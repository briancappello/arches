#
# p1-powersave — Maximum battery life for ThinkPad P1 Gen 7
#
# Intel Core Ultra 7 165H (Meteor Lake) + NVIDIA RTX 3000 Ada
#
# CPU biased fully toward efficiency cores, turbo disabled,
# firmware PL1/PL2 minimized via platform profile.
# GPU is managed separately via gpu-ollama script.
#

[main]
summary=ThinkPad P1 Gen 7 — maximum battery life

[cpu]
governor=powersave
energy_perf_bias=power
energy_performance_preference=power
boost=0

[acpi]
platform_profile=low-power

[audio]
timeout=10

[video]
panel_power_savings=3

[disk]

[net]

[scsi_host]
alpm=med_power_with_dipm

[sysctl]
vm.laptop_mode=5
vm.dirty_writeback_centisecs=1500
kernel.nmi_watchdog=0

[script]
script=${i:PROFILE_DIR}/script.sh
