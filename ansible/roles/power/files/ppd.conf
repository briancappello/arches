[main]
# The default PPD profile
default=balanced
battery_detection=true
sysfs_acpi_monitor=true

[profiles]
# PPD profile name = tuned profile name
# These map KDE's panel power switcher to our custom profiles
power-saver=p1-powersave
balanced=p1-balanced
performance=p1-performance

[battery]
# On battery, "balanced" stays on p1-balanced (same as AC).
# Users can manually switch to power-saver from the KDE panel
# for maximum battery savings.
balanced=p1-balanced
