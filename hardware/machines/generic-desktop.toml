# Machine profile: Generic desktop
#
# Fallback for unrecognized desktops.  No machine-specific packages or
# services — only auto-detected quirks are applied.

[machine]
name = "Generic Desktop"
description = "Unrecognized desktop — auto-detected quirks only"
platform = "x86-64"

[match]
chassis_type = [3, 4, 5, 6, 7, 13, 15, 16, 17, 24, 35, 36]
# desktop, low-profile, pizza-box, mini-tower, tower, all-in-one,
# space-saving, lunch-box, main-server, expansion-chassis, mini-PC, stick-PC
