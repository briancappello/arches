[meta]
name = "Cosmic Workstation"
description = "Cosmic desktop with full development toolchain"

[system]
timezone = "America/Denver"
locale = "en_US.UTF-8"

[modules]
include = [
    # Base
    "base",
    "zsh",
    "dev-tools",
    "fonts",
    "pipewire",
    "snapshots",
    "containers",
    "hardware-rescan",
    # Networking
    "networking",
    # Desktop
    "cosmic",
    # Dev toolchains
    "rust",
    "go",
    "python",
    "nodejs",
    # Services
    "postgresql",
    "redis",
    "rabbitmq",
    "nginx",
]
