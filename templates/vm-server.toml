[meta]
name = "VM Server"
description = "Headless server — nginx, postgres, redis, SSH"

[system]
timezone = "America/Denver"
locale = "en_US.UTF-8"

[install.pacstrap]
packages = [
    # Server
    "openssh",
    "nginx",
    "postgresql",
    "redis",
    "ansible",
    # Networking
    "networkmanager",
    "firewalld",
    "nftables",
    # Monitoring
    "htop",
    "btop",
    "iotop",
    # Tools
    "git",
    "neovim",
    "tmux",
    "zsh",
    "rsync",
    "curl",
    "wget",
    "jq",
]

[install.override]
packages = []

[install.firstboot]
packages = []

[services]
enable = [
    "NetworkManager",
    "sshd",
    "nginx",
    "postgresql",
    "redis",
    "firewalld",
    "fstrim.timer",
]

[ansible]
firstboot_roles = ["mirrors", "base", "zsh", "vm-server"]
