# Arches platform config — aarch64 (generic ARM64)
#
# Target: Arch Linux ARM on generic ARM64 hardware (RPi, server boards, etc.)
# Uses GRUB (UEFI-only) with btrfs and grub-btrfs for snapshot boot entries.

[platform]
name = "aarch64-generic"
description = "Generic ARM64 with Arch Linux ARM"
arch = "aarch64"

[kernel]
package = "linux-aarch64"
headers = "linux-aarch64-headers"

[bootloader]
type = "grub"
efi_binary = "BOOTAA64.EFI"
efi_fallback_path = "EFI/BOOT/BOOTAA64.EFI"
supports_bios = false
snapshot_boot = true

[disk_layout]
# ESP + btrfs root with subvolumes. GRUB reads btrfs natively so
# /boot lives on the @ subvolume — no separate /boot partition needed.
# ESP mounts at /boot/efi for GRUB's EFI binary only.
filesystem = "btrfs"
mount_options = "compress=zstd:1,noatime"
subvolumes = ["@", "@home", "@var"]
esp_size_mib = 512
swap = "zram"

[hardware_detection]
enabled = false

[base_packages]
# Always installed by pacstrap regardless of template.
install = [
    "archlinuxarm-keyring",
    "grub",
    "efibootmgr",
    "grub-btrfs",
    "btrfs-progs",
]

[aur_packages]
build = []

[iso]
boot_modes = [
    "uefi.grub",
]
extra_packages = [
    "linux-aarch64",
    "linux-aarch64-headers",
    "linux-firmware",
    "grub",
    "efibootmgr",
]

[qemu]
binary = "qemu-system-aarch64"
firmware = "/usr/share/edk2/aarch64/QEMU_EFI.fd"
extra_args = ["-machine", "virt", "-cpu", "max"]
