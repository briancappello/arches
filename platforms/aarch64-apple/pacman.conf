#
# Arches pacman.conf — aarch64-apple with Asahi Linux repos
# Asahi repos above ALARM repos for Apple Silicon-specific packages
#

[options]
HoldPkg     = pacman glibc
Architecture = aarch64
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# Asahi Linux ALARM repos (Apple Silicon kernel, mesa, firmware)
# Packages are hosted as GitHub releases from asahi-alarm/asahi-alarm
[asahi-alarm]
SigLevel = Required
Server = https://github.com/asahi-alarm/asahi-alarm/releases/download/$arch

# Local AUR repo (pre-built packages embedded in the installer)
[arches-local]
SigLevel = Optional TrustAll
Server = file:///opt/arches-repo

# Arch Linux ARM repos (multiple mirrors for resilience)
[core]
Server = http://mirror.archlinuxarm.org/$arch/$repo
Server = http://de.mirror.archlinuxarm.org/$arch/$repo
Server = http://eu.mirror.archlinuxarm.org/$arch/$repo
Server = http://sg.mirror.archlinuxarm.org/$arch/$repo

[extra]
Server = http://mirror.archlinuxarm.org/$arch/$repo
Server = http://de.mirror.archlinuxarm.org/$arch/$repo
Server = http://eu.mirror.archlinuxarm.org/$arch/$repo
Server = http://sg.mirror.archlinuxarm.org/$arch/$repo

[alarm]
Server = http://mirror.archlinuxarm.org/$arch/$repo
Server = http://de.mirror.archlinuxarm.org/$arch/$repo
Server = http://eu.mirror.archlinuxarm.org/$arch/$repo
Server = http://sg.mirror.archlinuxarm.org/$arch/$repo

[aur]
Server = http://mirror.archlinuxarm.org/$arch/$repo
Server = http://de.mirror.archlinuxarm.org/$arch/$repo
Server = http://eu.mirror.archlinuxarm.org/$arch/$repo
Server = http://sg.mirror.archlinuxarm.org/$arch/$repo
