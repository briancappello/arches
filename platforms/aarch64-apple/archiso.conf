# Apple Silicon USB boot requires platform-specific modules in the initramfs.
#
# USB-C PHY + controller stack (all required for USB ports to function):
#   phy_apple_atc            — Apple Type-C PHY (powers the USB-C ports)
#   apple_tunable            — Apple SoC tunable registers (phy dependency)
#   typec                    — USB Type-C framework
#   tps6598x                 — TI TPS6598x USB-PD controller
#   dwc3, dwc3_apple         — DesignWare USB3 controller (Apple variant)
#   xhci_hcd, xhci_plat_hcd — XHCI host controller (device-tree, not PCI)
#
# USB storage:
#   usb_storage, uas         — USB mass storage / USB Attached SCSI
#
# Input (built-in MacBook keyboard + trackpad):
#   dockchannel_hid          — Apple dockchannel HID transport
#   hid_apple                — Apple keyboard layout / fn keys
#
# Input (external USB keyboard, for recovery shell):
#   usbhid                   — USB HID driver
HOOKS=(base udev modconf kms archiso archiso_loop_mnt archiso_pxe_http block filesystems keyboard)
MODULES=(phy_apple_atc apple_tunable typec tps6598x dwc3 dwc3_apple xhci_hcd xhci_plat_hcd usb_storage uas dockchannel_hid hid_apple usbhid)
COMPRESSION="zstd"
COMPRESSION_OPTIONS=(-3)
