# Arches platform config — x86-64 with CachyOS optimized packages
#
# This defines the hardware-level foundation: kernel, repos, bootloader,
# hardware detection, and base packages. Templates build on top of this.
#
# See platforms/x86-64/README.md for details on optimization tiers and
# kernel variant options.

[platform]
name = "x86-64"
description = "x86-64 with CachyOS x86-64-v3 optimized packages (AVX2/SSE4.2)"
arch = "x86_64"
cachyos_optimization_tier = "x86-64-v3"

[kernel]
# Multiple kernel variants produce multiple bootloader entries.
# The first variant is the default unless one is explicitly marked default = true.
variants = [
    { package = "linux-cachyos", headers = "linux-cachyos-headers" },
    { package = "linux-cachyos-lts", headers = "linux-cachyos-lts-headers" },
]

[bootloader]
type = "limine"
efi_binary = "BOOTX64.EFI"
efi_fallback_path = "EFI/BOOT/BOOTX64.EFI"
supports_bios = true
snapshot_boot = true

[disk_layout]
# Default auto-install layout: ESP doubles as /boot, btrfs with subvolumes
filesystem = "btrfs"
mount_options = "compress=zstd:1,noatime,ssd,discard=async"
subvolumes = ["@", "@home", "@var"]
esp_size_mib = 2048  # large ESP for snapshot kernel copies
swap = "zram"

[hardware_detection]
enabled = true
tool = "chwd"
args = ["-a"]
optional = true  # non-fatal failure (expected in VMs without discrete GPU)

[base_packages]
# Always installed by pacstrap regardless of template.
# These are platform-specific — repo keyrings, mirrorlists, settings,
# bootloader, and hardware detection tools.
install = [
    "cachyos-keyring",
    "cachyos-mirrorlist",
    "cachyos-v3-mirrorlist",
    "cachyos-settings",
    "limine",
    "efibootmgr",
    "chwd",
    "limine-snapper-sync",
    "memtest86+-efi",
]

[aur_packages]
# AUR packages to pre-build into the local repo for this platform
build = [
    "limine-snapper-sync",
]

[iso]
boot_modes = [
    "bios.syslinux",
    "uefi.grub",
]
# Platform-specific packages for the live ISO environment.
# Kernel packages are NOT listed here — they are automatically injected
# from [kernel].variants by the build system.
extra_packages = [
    "linux-firmware",
    "cachyos-keyring",
    "cachyos-mirrorlist",
    "cachyos-v3-mirrorlist",
    "cachyos-settings",
    "chwd",
    "limine",
    "efibootmgr",
]

[qemu]
binary = "qemu-system-x86_64"
firmware = "/usr/share/edk2/x64/OVMF.4m.fd"
extra_args = ["-enable-kvm", "-cpu", "host"]
