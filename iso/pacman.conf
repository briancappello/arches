#
# Arches ISO pacman.conf
# CachyOS v3 repos above Arch repos for optimized packages
#

[options]
HoldPkg     = pacman glibc
Architecture = x86_64
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# CachyOS v3 optimized repos (AVX2/SSE4.2 — 2011+ hardware)
[cachyos-v3]
Include = /etc/pacman.d/cachyos-v3-mirrorlist

[cachyos-core-v3]
Include = /etc/pacman.d/cachyos-v3-mirrorlist

[cachyos-extra-v3]
Include = /etc/pacman.d/cachyos-v3-mirrorlist

# CachyOS base repo (kernels, tooling)
[cachyos]
Include = /etc/pacman.d/cachyos-mirrorlist

# Pre-built local repo (AUR packages baked into ISO)
[arches-local]
SigLevel = Optional TrustAll
Server = file:///opt/arches-repo

# Arch repos
[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist
