# Per-model config for llama-server@example.service
#
# Copy this file to /etc/llama-cpp/models.d/<your-alias>.conf and
# enable the service with:
#
#     sudo systemctl enable --now llama-server@<your-alias>
#
# Each variable here OVERRIDES the corresponding default in
# /etc/llama-cpp/config.

# Model file (GGUF). Place your .gguf in /opt/models/ (the bulk-storage
# ext4 partition on llm-workstation; a plain dir otherwise) or
# anywhere readable by the `llama` user. Users can access this path
# as ~/models from their home directory (symlink created at firstboot).
LLAMA_MODEL=/opt/models/your-model.gguf

# Optional alias name used in API responses (defaults to the model
# filename). Useful when pointing OpenAI-compatible clients at this
# server.
# LLAMA_ALIAS=qwen3-235b

# Bind address + port for this instance
LLAMA_HOST=127.0.0.1
LLAMA_PORT=8080

# GPU offload: -1 = all layers on GPU. For models bigger than VRAM,
# pick a number low enough to leave headroom for KV cache + activations.
# E.g. with 32GB VRAM and a 70B Q5_K_M (~50GB), try LLAMA_NGL=45.
LLAMA_NGL=-1

# Context window. Watch KV cache memory: roughly ctx * n_kv_heads * 2
# bytes per layer.
LLAMA_CTX=8192

# Per-instance extra flags. Examples:
#
#   Big MoE on hybrid VRAM/RAM (Qwen3-235B-A22B, Mixtral 8x22B):
#     LLAMA_OPTS=--flash-attn --override-tensor 'exps=CPU' --threads 16
#
#   Dense 70B with most layers on GPU:
#     LLAMA_OPTS=--flash-attn --threads 8
#
#   Speculative decoding with a draft model:
#     LLAMA_OPTS=--flash-attn -md /opt/models/draft.gguf -ngld -1
LLAMA_OPTS=--flash-attn
