[meta]
name = "Base System"
description = "Core system configuration — pacman, journald, NTP, neovim, mirror optimization"
category = "base"

[install.pacstrap]
packages = [
    "pacman-contrib",
    "base-devel",
    "neovim",
    "git",
    "ansible",
    "reflector",
    # Filesystem & partitioning
    "parted",
    "gptfdisk",
    "dosfstools",
    "e2fsprogs",
    "btrfs-progs",
    "lvm2",
    # CLI utilities
    "htop",
    "btop",
    "rsync",
    "curl",
    "wget",
    "jq",
    "unzip",
    "pv",
    "less",
    "man-db",
    "man-pages",
]
