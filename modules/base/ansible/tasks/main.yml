---
# Base system configuration — applied to all templates.
# Merges the former "mirrors" and "base" roles.

# ==========================================================================
# Mirror optimization (formerly mirrors role)
# ==========================================================================

- name: Install reflector
  pacman:
    name: reflector
    state: present
  ignore_errors: true

- name: Deploy reflector config
  copy:
    src: reflector.conf
    dest: /etc/xdg/reflector/reflector.conf
    mode: '0644'

- name: Generate fresh Arch mirrorlist with reflector
  command: >
    reflector
    --protocol https
    --country US
    --sort rate
    --latest 10
    --save /etc/pacman.d/mirrorlist
  ignore_errors: true

- name: Enable reflector weekly timer
  systemd:
    name: reflector.timer
    enabled: yes
    state: started

- name: Refresh CachyOS mirrorlist (if rate-mirrors is available)
  command: rate-mirrors --save /etc/pacman.d/cachyos-mirrorlist cachyos
  ignore_errors: true

- name: Refresh CachyOS tier mirrorlist (if rate-mirrors is available)
  command: "rate-mirrors --save /etc/pacman.d/{{ cachyos_tier_mirrorlist }} cachyos"
  ignore_errors: true
  when: cachyos_tier_mirrorlist is defined and cachyos_tier_mirrorlist != ""

- name: Sync pacman databases with fresh mirrors
  command: pacman -Sy --noconfirm
  ignore_errors: true

# ==========================================================================
# Base system (formerly base role)
# ==========================================================================

- name: Set default shell to zsh for root
  user:
    name: root
    shell: /bin/zsh

- name: Configure pacman parallel downloads
  lineinfile:
    path: /etc/pacman.conf
    regexp: '^#?ParallelDownloads'
    line: 'ParallelDownloads = 5'
    insertafter: '^\[options\]'

- name: Enable Color in pacman
  lineinfile:
    path: /etc/pacman.conf
    regexp: '^#?Color'
    line: 'Color'
    insertafter: '^\[options\]'

- name: Configure makepkg to use all cores
  lineinfile:
    path: /etc/makepkg.conf
    regexp: '^#?MAKEFLAGS='
    line: 'MAKEFLAGS="-j$(nproc)"'

- name: Set journald max disk usage
  lineinfile:
    path: /etc/systemd/journald.conf
    regexp: '^#?SystemMaxUse='
    line: 'SystemMaxUse=50M'
    create: yes

# --------------------------------------------------------------------------
# Surface firstboot failure at shell login
# --------------------------------------------------------------------------
# If /opt/arches/firstboot-failed exists, print its contents on every
# interactive shell login (TTY and SSH). This makes a failed firstboot
# visible to the operator who SSHes in to investigate, instead of being
# buried in /var/log/arches-firstboot.log.

- name: Deploy firstboot-failure MOTD
  copy:
    dest: /etc/profile.d/00-arches-firstboot-status.sh
    mode: '0644'
    content: |
      # Surface Arches firstboot failure on interactive shell login.
      # Auto-generated by modules/base/ansible — do not edit.
      if [ -t 1 ] && [ -f /opt/arches/firstboot-failed ]; then
          printf '\n\033[1;33m=== Arches first-boot setup did not complete cleanly ===\033[0m\n'
          cat /opt/arches/firstboot-failed
          printf '\n'
      fi

- name: Enable NTP
  systemd:
    name: systemd-timesyncd
    enabled: yes
    state: started

# --------------------------------------------------------------------------
# Neovim — base config for all users
# --------------------------------------------------------------------------

- name: Create neovim config directory for {{ ansible_user | default('brian') }}
  become_user: "{{ ansible_user | default('brian') }}"
  file:
    path: "/home/{{ ansible_user | default('brian') }}/.config/nvim"
    state: directory
    mode: '0755'

- name: Deploy neovim config for {{ ansible_user | default('brian') }}
  become_user: "{{ ansible_user | default('brian') }}"
  copy:
    src: init.lua
    dest: "/home/{{ ansible_user | default('brian') }}/.config/nvim/init.lua"
    mode: '0644'

- name: Create neovim config directory for root
  file:
    path: /root/.config/nvim
    state: directory
    mode: '0755'

- name: Deploy neovim config for root
  copy:
    src: init.lua
    dest: /root/.config/nvim/init.lua
    mode: '0644'
